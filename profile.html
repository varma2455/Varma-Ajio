.logo{

.logo a{

.right{

.search{

/* PROFILE LAYOUT */

gap:20px;

.sidebar{

padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.sidebar h3{
margin-bottom:20px;
}

.sidebar a{
display:block;
padding:12px;

color:black;
border-radius:6px;
margin-bottom:10px;
}

.sidebar a:hover{
background:#eee;
}

/* LOGOUT BUTTON */

.logout{
background:#e53935;
color:white;
text-align:center;
margin-top:20px;
}

/* PROFILE CARD */

.profile-card{
flex:1;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* PROFILE IMAGE */

.profile-img{
text-align:center;
margin-bottom:20px;
}

.profile-img img{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
border:4px solid #ddd;
}

.profile-img input{
margin-top:10px;
}

/* FORM */

form{
display:flex;
flex-direction:column;
gap:15px;
}

input{
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:12px;
background:black;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#333;
}

</style>

</head>

<body>

    <div class="navbar">

        <div class="logo"><a href="./Index.html"></ahref>AJIO</div>

        <div class="search">
        <input type="text" placeholder="Search AJIO">
        <i class="fa fa-search"></i>
        </div>

            <i class="fa fa-heart"></i>
            <span class="badge" id="wishlist-count">0</span>
            </div>
        
        <div class="icon cart" onclick="goToCart()">
            <i class="fa fa-shopping-bag"></i>
            <span class="badge" id="cart-count">0</span>
            </div>
        
        <div class="icon" onclick="goToProfile()">
            <i class="fa fa-user"></i>
            </div>
        </div>
        
        </div>
        

<div class="wrapper">

<!-- SIDEBAR -->

<div class="sidebar">

<h3>My Account</h3>

<a href="./profile.html"><i class="fa fa-user"></i> Profile</a>

<a href="./wishlist.html"><i class="fa fa-heart"></i> Wishlist</a>

<a href="./cart.html"><i class="fa fa-box"></i> Orders</a>

<a href="#"><i class="fa fa-gear"></i> Settings</a>

<a href="#" class="logout" onclick="logoutUser()">
<i class="fa fa-sign-out-alt"></i> Logout
</a>

</div>

<!-- PROFILE CARD -->

<div class="profile-card">

<div class="profile-img">

<img id="profilePic"
src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

<br>

<input type="file" id="uploadImg">

</div>

<form id="profileForm">

<input type="text" id="name" placeholder="Full Name">

<input type="email" id="email" placeholder="Email">

<input type="text" id="phone" placeholder="Phone Number">

<input type="text" id="address" placeholder="Address">

<button type="submit">Save Profile</button>

</form>

</div>

</div>

<script>

/* LOAD PROFILE */

const user=JSON.parse(localStorage.getItem("userProfile"))

if(user){

document.getElementById("name").value=user.name
document.getElementById("email").value=user.email
document.getElementById("phone").value=user.phone
document.getElementById("address").value=user.address
document.getElementById("profilePic").src=user.image

}

/* SAVE PROFILE */

document.getElementById("profileForm").onsubmit=function(e){

e.preventDefault()

const userData={

name:document.getElementById("name").value,
email:document.getElementById("email").value,
phone:document.getElementById("phone").value,
address:document.getElementById("address").value,
image:document.getElementById("profilePic").src

}

localStorage.setItem("userProfile",JSON.stringify(userData))

alert("Profile Updated Successfully")

}

/* IMAGE UPLOAD */

document.getElementById("uploadImg").onchange=function(){

const reader=new FileReader()

reader.onload=function(e){

document.getElementById("profilePic").src=e.target.result

}

reader.readAsDataURL(this.files[0])

}

/* LOGOUT */

function logoutUser(){

localStorage.removeItem("userProfile")

alert("Logged Out Successfully")

window.location.href="login.html"

}

/* HOME BUTTON */

function goHome(){

window.location.href="index.html"

}


function goToProfile(){
window.location.href="profile.html";
}

    window.location.href = "cart.html"
}

}

function gotowish(){
window.location.href="wishlist.html";
}
</script>
