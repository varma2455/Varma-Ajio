<!DOCTYPE html>
<html lang="en">

href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Cart Page</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;

border-bottom:1px solid #ddd;
}

.logo{

}

.cart-count{

}

/* CART CONTAINER */

.container{

margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
}

/* CART ITEM */

.cart-item{
display:grid;
grid-template-columns:100px 1fr 120px 120px 80px;
align-items:center;
gap:15px;
padding:15px 0;
border-bottom:1px solid #ddd;
}

.cart-item img{

}

}

.remove{

}

/* TOTAL */

.total{

}

/* BUTTONS */

.actions{

display:flex;

}

.btn{
padding:12px 18px;
border:none;

border-radius:6px;
}

.continue{
background:#ddd;
}

.checkout{
background:#2e7d32;
color:white;
}

/* MOBILE */

@media(max-width:768px){

.cart-item{
grid-template-columns:1fr;
text-align:center;
}

.actions{
flex-direction:column;
gap:10px;
}

}


.navbar{
display:flex;

    text-decoration: none;

.right{

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <div class="logo"><a href="./Index.html"></ahref>AJIO</div>
    
    <nav class="menu">
    
    <a href="#">MEN</a>
    <a href="#">WOMEN</a>
    <a href="#">KIDS</a>
    <a href="#">BEAUTY</a>
    <a href="#">HOME</a>
    <a href="#">FOOTWEAR</a>
    <a href="#">BAGS</a>
    <a href="#">JEWELRY</a>
    <a href="#">WATCHES</a>
    <a href="#">SPORTSWEAR</a>
    <a href="./Product.html">Shop Products</a>
    
    </nav>
    
    <div class="right">
    
    <div class="search">
    <input type="text" placeholder="Search AJIO">
    <i class="fa fa-search"></i>
    </div>
    
    <div class="icon" onclick="goToWishlist()">
        <i class="fa fa-heart"></i>
        <span class="badge" id="wishlist-count">0</span>
        </div>
    
    <div class="icon cart" onclick="goToCart()">
        <i class="fa fa-shopping-bag"></i>
        <span class="badge" id="cart-count">0</span>
        </div>
    
    <div class="icon" onclick="goToProfile()">
        <i class="fa fa-user"></i>
        </div>
    </div>
    
    </div>

<!-- CART -->

<div class="container">

<h2>Your Cart</h2>

<div id="cart-items"></div>

<div class="total">
Total: $<span id="total-price">0</span>
</div>

<div class="actions">

<button class="btn continue" onclick="continueShopping()">
Continue Shopping
</button>

<button class="btn checkout" id="checkout-btn">
Proceed to Checkout
</button>

</div>

</div>

<script>

/* LOAD CART */

let cart = JSON.parse(localStorage.getItem("cart")) || []

const cartContainer = document.getElementById("cart-items")

/* DISPLAY CART */

function renderCart(){

cartContainer.innerHTML=""

let total=0
let count=0

cart.forEach((item,index)=>{

total += item.price * item.qty
count += item.qty

cartContainer.innerHTML += `

<div class="cart-item">

<img src="${item.image}">

<div>
<h4>${item.title}</h4>
<p>Size: ${item.size || "Default"}</p>
<p>$${item.price}</p>
</div>

<div class="qty">

<button onclick="decQty(${index})">−</button>
<span>${item.qty}</span>
<button onclick="incQty(${index})">+</button>

</div>

<div>
$${(item.price * item.qty).toFixed(2)}
</div>

<button class="remove" onclick="removeItem(${index})">
Remove
</button>

</div>

`

})

document.getElementById("total-price").innerText = total.toFixed(2)
document.getElementById("cart-count").innerText = count

updateCheckout()

}

/* QUANTITY */

function incQty(i){

cart[i].qty++

saveCart()

}

function decQty(i){

if(cart[i].qty > 1){
cart[i].qty--
saveCart()
}

}

/* REMOVE ITEM */

function removeItem(i){

cart.splice(i,1)

saveCart()

}

/* SAVE CART */

function saveCart(){

localStorage.setItem("cart",JSON.stringify(cart))

renderCart()

}

/* CHECKOUT BUTTON */

function updateCheckout(){

const btn=document.getElementById("checkout-btn")

if(cart.length === 0){

btn.disabled=true
btn.style.opacity=0.5

}else{

btn.disabled=false
btn.style.opacity=1

}

}

/* CONTINUE SHOPPING */

function continueShopping(){

window.location.href="Index.html"

}

/* INITIAL LOAD */

renderCart()

function goToCart(){
    window.location.href = "cart.html"
}


function goToProfile(){
window.location.href="profile.html";
}

function gotowish(){
window.location.href="wishlist.html";
}

let wishlist = JSON.parse(localStorage.getItem("wishlist")) || []

document.getElementById("wishlist-count").innerText = wishlist.length

</script>

</body>
</html>
