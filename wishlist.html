<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Detail</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* NAVBAR */

.navbar{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 40px;
background:white;
border-bottom:1px solid #ddd;
position:sticky;
top:0;
z-index:10;
}

.logo{
font-size:28px;
font-weight:bold;
letter-spacing:4px;
}

.logo a{
    text-decoration: none;
    color: black;
}

.menu{
display:flex;
gap:25px;
}

.menu a{
text-decoration:none;
color:black;
font-weight:600;
font-size:14px;
}

.menu a:hover{
color:#e53935;
}

.right{
display:flex;
align-items:center;
gap:20px;
}

.search{
border:1px solid #ccc;
padding:6px 10px;
border-radius:20px;
display:flex;
align-items:center;
}

.search input{
border:none;
outline:none;
}

.icon{
font-size:18px;
cursor:pointer;
}

.cart{
position:relative;
}

/* PRODUCT DETAIL */

.product-detail{
max-width:1200px;
margin:40px auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
background:white;
padding:30px;
border-radius:10px;
}

/* IMAGE */

.gallery img{
width:100%;
border-radius:8px;
}

.thumbs{
display:flex;
gap:10px;
margin-top:10px;
}

.thumbs img{
width:70px;
cursor:pointer;
border:1px solid #ddd;
}

/* PRODUCT INFO */

.price{
font-size:22px;
color:#e53935;
font-weight:bold;
margin:10px 0;
}

.rating{
color:orange;
margin:5px 0;
}

/* SIZE */

.sizes button{
padding:8px 12px;
margin:5px;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

.sizes button.active{
background:black;
color:white;
}

/* COLOR */

.colors button{
width:25px;
height:25px;
border-radius:50%;
border:none;
margin:5px;
cursor:pointer;
}

.black{background:black;}
.red{background:red;}
.blue{background:blue;}

/* QUANTITY */

.qty{
display:flex;
align-items:center;
gap:10px;
margin:15px 0;
}

.qty button{
padding:5px 12px;
}

/* BUTTONS */

.buttons{
display:flex;
gap:10px;
margin-top:20px;
}

.add{
background:black;
color:white;
padding:12px 20px;
border:none;
cursor:pointer;
}

.buy{
background:#2e7d32;
color:white;
padding:12px 20px;
border:none;
cursor:pointer;
}

/* DESCRIPTION */

.desc{
margin-top:20px;
color:#555;
}

/* RELATED */

.related{
max-width:1200px;
margin:40px auto;
}

.related-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;
padding:10px;
border-radius:8px;
text-align:center;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.zoom-container{
position:relative;
overflow:hidden;
cursor:zoom-in;
border-radius:8px;
}

.zoom-container img{
width:100%;
transition:transform 0.2s;
transform-origin:center center;
}

.wish{
background:#e53935;
color:white;
padding:12px 20px;
border:none;
cursor:pointer;
border-radius:5px;
}

.back-btn{
background:#444;
color:white;
border:none;
padding:8px 14px;
margin-bottom:15px;
cursor:pointer;
border-radius:5px;
}


</style>
</head>

<body>

    <div class="navbar">

        <div class="logo"><a href="./Index.html"></ahref>AJIO</div>
        
        <nav class="menu">
        
        <a href="#">MEN</a>
        <a href="#">WOMEN</a>
        <a href="#">KIDS</a>
        <a href="#">BEAUTY</a>
        <a href="#">HOME</a>
        <a href="#">FOOTWEAR</a>
        <a href="#">BAGS</a>
        <a href="#">JEWELRY</a>
        <a href="#">WATCHES</a>
        <a href="#">SPORTSWEAR</a>
        <a href="./Product.html">Shop Products</a>
        
        </nav>
        
        <div class="right">
        
        <div class="search">
        <input type="text" placeholder="Search AJIO">
        <i class="fa fa-search"></i>
        </div>
        
        <div class="icon" onclick="goToWishlist()">
            <i class="fa fa-heart"></i>
            <span class="badge" id="wishlist-count">0</span>
            </div>
        
        <div class="icon cart" onclick="goToCart()">
            <i class="fa fa-shopping-bag"></i>
            <span class="badge" id="cart-count">0</span>
            </div>
        
        <div class="icon" onclick="goToProfile()">
            <i class="fa fa-user"></i>
            </div>
        </div>
        
        </div>
    
    
<!-- PRODUCT DETAIL -->

<div class="product-detail">

    <div class="gallery">

        <div class="zoom-container">
        <img id="main-img">
        </div>
        
        <div class="thumbs">
        <img src="" id="t1">
        <img src="" id="t2">
        <img src="" id="t3">
        </div>
        
        </div>

<div>

<h2 id="title"></h2>

<div class="rating">
<i class="fa fa-star"></i>
<i class="fa fa-star"></i>
<i class="fa fa-star"></i>
<i class="fa fa-star"></i>
<i class="fa fa-star-half"></i>
</div>

<div class="price">₹<span id="price"></span></div>

<p>Total: ₹<span id="total"></span></p>

<h4>Size</h4>

<div class="sizes">
<button>S</button>
<button>M</button>
<button>L</button>
<button>XL</button>
</div>

<h4>Color</h4>

<div class="colors">
<button class="black"></button>
<button class="red"></button>
<button class="blue"></button>
</div>

<div class="qty">

<button onclick="dec()">−</button>

<span id="qty">1</span>

<button onclick="inc()">+</button>

</div>

<div class="buttons">

    <button class="add" onclick="addCart()">Add to Cart</button>

    <button class="buy">Buy Now</button>
    
    <button class="wish" onclick="addWishlist()">❤ Wishlist</button>
</div>

<div>


<p class="desc">
Premium quality product made with high quality material.
Perfect for casual and daily wear.
</p>

</div>

</div>

<button class="back-btn" onclick="goWishlist()">← Back to Wishlist</button>
    
    <h2 id="title"></h2>

<!-- RELATED PRODUCTS -->

<div class="related">

<h2>Related Products</h2>

<div class="related-grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<p>Men T-Shirt</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1549298916-b41d501d3772">
<p>Running Shoes</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
<p>Sneakers</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1585386959984-a415522316cb">
<p>Women Dress</p>
</div>

</div>

</div>

<script>

let qty=1

const product=JSON.parse(localStorage.getItem("viewProduct"))

document.getElementById("title").innerText=product.title
document.getElementById("price").innerText=product.price
document.getElementById("main-img").src=product.image

document.getElementById("t1").src=product.image
document.getElementById("t2").src=product.image
document.getElementById("t3").src=product.image

updateTotal()

function inc(){

qty++
document.getElementById("qty").innerText=qty
updateTotal()

}

function dec(){

if(qty>1){
qty--
document.getElementById("qty").innerText=qty
updateTotal()
}

}

function updateTotal(){

document.getElementById("total").innerText=product.price*qty

}

function addCart(){

let cart=JSON.parse(localStorage.getItem("cart"))||[]

cart.push({
title:product.title,
price:product.price,
image:product.image,
qty:qty
})

localStorage.setItem("cart",JSON.stringify(cart))

alert("Added to cart")

}


const zoomContainer = document.querySelector(".zoom-container")
const zoomImg = document.getElementById("main-img")

zoomContainer.addEventListener("mousemove", function(e){

const rect = zoomContainer.getBoundingClientRect()

const x = ((e.clientX - rect.left) / rect.width) * 100
const y = ((e.clientY - rect.top) / rect.height) * 100

zoomImg.style.transformOrigin = `${x}% ${y}%`
zoomImg.style.transform = "scale(2)"

})

zoomContainer.addEventListener("mouseleave", function(){

zoomImg.style.transform = "scale(1)"

})

function addWishlist(){

let wishlist = JSON.parse(localStorage.getItem("wishlist")) || []

const exists = wishlist.find(item => item.title === product.title)

if(!exists){

wishlist.push({
title:product.title,
price:product.price,
image:product.image
})

localStorage.setItem("wishlist",JSON.stringify(wishlist))

alert("Added to wishlist")

}else{

alert("Already in wishlist")

}

}

function goWishlist(){
window.location.href = "product-detail.html";
}

function goToCart(){
    window.location.href = "cart.html"
}


function goToProfile(){
window.location.href="profile.html";
}

function gotowish(){
window.location.href="wishlist.html";
}
</script>

</body>
</html>
