<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AJIO Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(120deg,#111,#444);
}

/* MAIN CARD */

.auth-box{
width:900px;
height:540px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
border-radius:14px;
display:flex;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

/* LEFT PANEL */

.left{
flex:1;
background:linear-gradient(135deg,#ff3d00,#ff6d00);
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:40px;
text-align:center;
}

.left h1{
font-size:34px;
margin-bottom:10px;
}

.left p{
font-size:14px;
opacity:0.9;
}

.switch-btn{
margin-top:25px;
padding:10px 25px;
border:2px solid white;
background:none;
color:white;
border-radius:30px;
cursor:pointer;
}

/* RIGHT PANEL */

.right{
flex:1;
padding:40px;
background:white;
}

/* FORMS */

form{
width:100%;
}

h2{
margin-bottom:20px;
}

.input{
position:relative;
margin-bottom:15px;
}

.input input{
width:100%;
padding:12px 40px 12px 12px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

.input i{
position:absolute;
right:12px;
top:14px;
color:#888;
cursor:pointer;
}

/* BUTTON */

button{
width:100%;
padding:12px;
border:none;
background:black;
color:white;
border-radius:6px;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#222;
}

/* PASSWORD STRENGTH */

.strength{
height:6px;
background:#eee;
margin-top:6px;
border-radius:4px;
overflow:hidden;
}

.strength span{
display:block;
height:100%;
width:0%;
background:red;
}

/* OTP BOX */

.otp{
display:flex;
gap:10px;
margin-top:10px;
}

.otp input{
width:40px;
height:40px;
text-align:center;
font-size:18px;
border:1px solid #ccc;
border-radius:5px;
}

/* SWITCH */

.signup{
display:none;
}

/* SOCIAL */

.social{
margin-top:20px;
display:flex;
gap:10px;
}

.social button{
flex:1;
background:#eee;
color:black;
}

.error{
color:red;
font-size:13px;
margin-top:5px;
}

/* MOBILE */

@media(max-width:900px){

.auth-box{
flex-direction:column;
height:auto;
width:95%;
}

.left{
display:none;
}

}

</style>
</head>

<body>

<div class="auth-box">

<!-- LEFT PANEL -->

<div class="left">

<h1>AJIO</h1>

<p>
Sign in to continue shopping and access your orders,
wishlist and personalized recommendations.
</p>

<button class="switch-btn" onclick="toggleForm()">
Create Account
</button>

</div>

<!-- RIGHT PANEL -->

<div class="right">

<!-- LOGIN -->

<form id="loginForm" class="login">

<h2>Login</h2>

<div class="input">
    <input type="email" id="loginPhone" placeholder="Email">
<i class="fa fa-phone"></i>
</div>

<div class="input">
<input type="password" id="loginPass" placeholder="Password">
<i class="fa fa-eye" onclick="togglePass('loginPass')"></i>
</div>

<div class="error" id="loginError"></div>

<button type="submit">Login</button>

<div class="social">

<button><i class="fa-brands fa-google"></i> Google</button>
<button><i class="fa-brands fa-facebook"></i> Facebook</button>

</div>

</form>

<!-- SIGNUP -->

<form id="signupForm" class="signup">

<h2>Create Account</h2>

<div class="input">
<input type="text" id="name" placeholder="Full Name">
</div>

<div class="input">
<input type="tel" id="phone" placeholder="Phone Number">
</div>

<div class="input">
<input type="email" id="email" placeholder="Email">
</div>

<div class="input">
<input type="password" id="password" placeholder="Password">
<i class="fa fa-eye" onclick="togglePass('password')"></i>

<div class="strength">
<span id="bar"></span>
</div>

</div>

<div class="input">
<input type="password" id="confirm" placeholder="Confirm Password">
</div>

<div class="error" id="signupError"></div>

<button type="submit">Sign Up</button>

</form>

</div>

</div>

<script>

/* SWITCH FORM */

function toggleForm(){

const login=document.querySelector(".login")
const signup=document.querySelector(".signup")

if(login.style.display==="none"){
login.style.display="block"
signup.style.display="none"
}else{
login.style.display="none"
signup.style.display="block"
}

}

/* PASSWORD SHOW */

function togglePass(id){

const input=document.getElementById(id)

if(input.type==="password"){
input.type="text"
}else{
input.type="password"
}

}

/* PASSWORD STRENGTH */

const password=document.getElementById("password")
const bar=document.getElementById("bar")

password.addEventListener("input",()=>{

let val=password.value
let strength=0

if(val.length>6) strength+=25
if(/[A-Z]/.test(val)) strength+=25
if(/[0-9]/.test(val)) strength+=25
if(/[^A-Za-z0-9]/.test(val)) strength+=25

bar.style.width=strength+"%"

if(strength<50) bar.style.background="red"
else if(strength<75) bar.style.background="orange"
else bar.style.background="green"

})

/* SIGNUP */

document.getElementById("signupForm").addEventListener("submit",(e)=>{

e.preventDefault()

let phone=document.getElementById("phone").value
let email=document.getElementById("email").value
let pass=document.getElementById("password").value
let confirm=document.getElementById("confirm").value

if(phone.length<10){
document.getElementById("signupError").innerText="Enter valid phone number"
return
}

if(pass!==confirm){
document.getElementById("signupError").innerText="Passwords do not match"
return
}

createUserWithEmailAndPassword(auth,email,pass)

.then((userCredential)=>{

alert("Account Created Successfully")

toggleForm()

})

.catch((error)=>{

document.getElementById("signupError").innerText=error.message

})

})

/* LOGIN */

document.getElementById("loginForm").addEventListener("submit",(e)=>{

e.preventDefault()

let email=document.getElementById("loginPhone").value
let pass=document.getElementById("loginPass").value

signInWithEmailAndPassword(auth,email,pass)

.then((userCredential)=>{

alert("Login Successful")

window.location.href="Index.html"

})

.catch((error)=>{

document.getElementById("loginError").innerText=error.message

})

})

// if(phone===savedPhone && pass===savedPass){

// alert("Login Successful")

// window.location.href="1.html"

// }else{

// document.getElementById("loginError").innerText="Invalid login details"

// }

// })

</script>



<script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    
    import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyABw-gnA3CWT6o5lX-RGCWYL_3kA3VO6ZY",
        authDomain: "ecommerce-varma.firebaseapp.com",
        projectId: "ecommerce-varma",
        storageBucket: "ecommerce-varma.firebasestorage.app",
        messagingSenderId: "295822806463",
        appId: "1:295822806463:web:69ba9fc7e10a69e8a7a50a",
        measurementId: "G-G55JKPVE78"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    
    /* SIGNUP */
    
    document.getElementById("signupForm").addEventListener("submit",(e)=>{
    
    e.preventDefault()
    
    let email=document.getElementById("email").value
    let pass=document.getElementById("password").value
    
    createUserWithEmailAndPassword(auth,email,pass)
    .then(()=>{
    alert("Account Created")
    })
    .catch((error)=>{
    document.getElementById("signupError").innerText=error.message
    })
    
    })
    
    /* LOGIN */
    
    document.getElementById("loginForm").addEventListener("submit",(e)=>{
    
    e.preventDefault()
    
    let email=document.getElementById("loginPhone").value
    let pass=document.getElementById("loginPass").value
    
    signInWithEmailAndPassword(auth,email,pass)
    
    .then(()=>{
    window.location.href="index.html"
    })
    
    .catch((error)=>{
    document.getElementById("loginError").innerText=error.message
    })
    
    })

    
    
    </script>
</body>
</html>
