<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Wishlist</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Arial;
margin:0;
background:#f6f6f6;
}

/* NAVBAR */

.navbar{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 40px;
background:white;
border-bottom:1px solid #ddd;
position:sticky;
top:0;
z-index:10;
}

.logo{
font-size:28px;
font-weight:bold;
letter-spacing:4px;
}

.logo a{
    text-decoration: none;
    color: black;
}

.menu{
display:flex;
gap:25px;
}

.menu a{
text-decoration:none;
color:black;
font-weight:600;
font-size:14px;
}

.menu a:hover{
color:#e53935;
}

.right{
display:flex;
align-items:center;
gap:20px;
}

.search{
border:1px solid #ccc;
padding:6px 10px;
border-radius:20px;
display:flex;
align-items:center;
}

.search input{
border:none;
outline:none;
}

.icon{
font-size:18px;
cursor:pointer;
}

.cart{
position:relative;
}

/* PAGE */

.container{
padding:40px;
}

h2{
margin-bottom:25px;
}

/* GRID */

.card{
background:white;
padding:16px;
border-radius:8px;
text-align:center;
transition:.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 6px 15px rgba(0,0,0,.15);
}

.card img{
width:150%;
height:200px;
object-fit:cover;
border-radius:6px;
}

.card h4{
font-size:15px;
margin:8px 0;
}

.price{
font-size:15px;
color:#e53935;
font-weight:bold;
margin-bottom:8px;
}

.actions{
display:flex;
gap:6px;
}

button{
flex:1;
padding:6px;
font-size:12px;
border:none;
background:black;
color:white;
cursor:pointer;
border-radius:4px;
}

.remove{
background:#e53935;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.card{
background:white;
padding:12px;
border-radius:8px;
text-align:center;
transition:0.3s;
}
.card:hover{
transform:translateY(-3px);
box-shadow:0 4px 12px rgba(0,0,0,.15);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:6px;
}

/* EMPTY */

.empty{
text-align:center;
font-size:20px;
padding:40px;
color:#777;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <div class="logo"><a href="./Index.html"></ahref>AJIO</div>
    
    <nav class="menu">
    
    <a href="#">MEN</a>
    <a href="#">WOMEN</a>
    <a href="#">KIDS</a>
    <a href="#">BEAUTY</a>
    <a href="#">HOME</a>
    <a href="#">FOOTWEAR</a>
    <a href="#">BAGS</a>
    <a href="#">JEWELRY</a>
    <a href="#">WATCHES</a>
    <a href="#">SPORTSWEAR</a>
    <a href="./Product.html">Shop Products</a>
    
    </nav>
    
    <div class="right">
    
    <div class="search">
    <input type="text" placeholder="Search AJIO">
    <i class="fa fa-search"></i>
    </div>
    
    <div class="icon" onclick="goToWishlist()">
        <i class="fa fa-heart"></i>
        <span class="badge" id="wishlist-count">0</span>
        </div>
    
    <div class="icon cart" onclick="goToCart()">
        <i class="fa fa-shopping-bag"></i>
        <span class="badge" id="cart-count">0</span>
        </div>
    
    <div class="icon" onclick="goToProfile()">
        <i class="fa fa-user"></i>
        </div>
    </div>
    
    </div>


<!-- WISHLIST -->

<div class="container">

<h2>My Wishlist ❤️</h2>

<div id="wishlist-items" class="grid"></div>

<div id="empty" class="empty"></div>

</div>

<script>

/* LOAD WISHLIST */

localStorage.removeItem("viewProduct");

let wishlist = JSON.parse(localStorage.getItem("wishlist")) || []

const container = document.getElementById("wishlist-items")
const empty = document.getElementById("empty")

function renderWishlist(){

container.innerHTML=""

if(wishlist.length === 0){

empty.innerText="Your wishlist is empty"

return

}

empty.innerText=""

wishlist.forEach((item,index)=>{

    container.innerHTML += `

<div class="card" onclick="viewProduct(${index})">

<img src="${item.image}">

<h4>${item.title}</h4>

<div class="price">₹${item.price}</div>

<div class="actions">

<button onclick="event.stopPropagation(); addToCart(${index})">
Add Cart
</button>

<button class="remove" onclick="event.stopPropagation(); removeItem(${index})">
Remove
</button>

</div>

</div>

`


})

}

/* ADD TO CART */

function addToCart(i){

let cart = JSON.parse(localStorage.getItem("cart")) || []

cart.push({
title:wishlist[i].title,
price:wishlist[i].price,
image:wishlist[i].image,
qty:1
})

localStorage.setItem("cart",JSON.stringify(cart))

alert("Added to cart")

}

/* REMOVE ITEM */

function removeItem(i){

wishlist.splice(i,1)

localStorage.setItem("wishlist",JSON.stringify(wishlist))

renderWishlist()

}

/* NAVIGATION */

function goHome(){
window.location.href="index.html"
}

function goCart(){
window.location.href="cart.html"
}

/* INITIAL LOAD */

renderWishlist()


function viewProduct(index){

const product = wishlist[index]

localStorage.setItem("viewProduct", JSON.stringify(product))

window.location.href = "wishlist.html"

}

function viewProduct(index){

const product = wishlist[index]

localStorage.setItem("viewProduct", JSON.stringify(product))

window.location.href = "wishlist.html"

}

function goToCart(){
    window.location.href = "cart.html"
}


function goToProfile(){
window.location.href="profile.html";
}

function gotowish(){
window.location.href="wishlist.html";
}
</script>

</body>
</html>
